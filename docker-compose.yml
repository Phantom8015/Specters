version: '3.8'

services:
  specters:
    build: .
    
    
    container_name: specters
    ports:
      - "3000:3000"
    volumes:
      - ${HOST_HOME}:/app/managed/home:rw
      - ${HOST_LOGS:-/var/log}:/app/managed/logs:ro
      # Persist user accounts, session secret, and active sessions across restarts
      - specters_data:/app/data
      
      
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    
    security_opt:
      - no-new-privileges:true
    
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/ping', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  specters_data:


  
  
  
  
  
  
  
  
  
