<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specters — Admin</title>
    <link rel="stylesheet" href="/auth.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        display: block;
        padding: 0;
        background: #000;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="specters-bg"></div>
    <div class="admin-layout">
      <header class="admin-header">
        <div class="admin-header-title">
          <i class="fas fa-users-cog"></i>
          User Management
        </div>
        <div class="admin-header-spacer"></div>
        <span
          id="current-user-display"
          style="font-size: 12px; color: var(--text-muted); margin-right: 8px"
        ></span>
        <a href="/" class="admin-back-btn">
          <i class="fas fa-arrow-left"></i> Back to App
        </a>
      </header>

      <main class="admin-body">
        <div class="admin-section">
          <div class="admin-section-header">
            <div class="admin-section-title">
              <i
                class="fas fa-users"
                style="color: var(--accent); margin-right: 6px"
              ></i>
              Users
            </div>
            <button class="admin-action-btn primary" id="add-user-btn">
              <i class="fas fa-plus"></i> Add User
            </button>
          </div>

          <div id="users-container">
            <div class="empty-state">
              <i class="fas fa-circle-notch fa-spin"></i>
              Loading users…
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="notif" id="notif"></div>

    <div class="modal-overlay" id="user-modal">
      <div class="modal-box">
        <div class="modal-head">
          <div class="modal-head-title" id="modal-title">Add User</div>
          <button class="modal-close-btn" id="modal-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body" id="modal-body">
          <div class="form-group">
            <label class="form-label" for="m-username">Username</label>
            <input
              type="text"
              class="form-input"
              id="m-username"
              placeholder="e.g. alice"
              maxlength="32"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
            />
          </div>

          <div class="form-group" id="m-password-group">
            <label class="form-label" for="m-password">
              Password
              <span
                id="m-password-hint"
                style="
                  font-weight: 400;
                  text-transform: none;
                  letter-spacing: 0;
                "
              ></span>
            </label>
            <div class="input-wrapper">
              <input
                type="password"
                class="form-input"
                id="m-password"
                placeholder="Enter password (min 8 chars)"
                autocomplete="new-password"
              />
              <button
                type="button"
                class="input-toggle"
                id="m-toggle-pass"
                tabindex="-1"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="m-role">Role</label>
            <select class="form-input" id="m-role">
              <option value="readonly">
                Read-only — can browse and download
              </option>
              <option value="readwrite" selected>
                Read/Write — can also upload, create, edit
              </option>
              <option value="admin">
                Admin — full access, can manage users
              </option>
            </select>
          </div>

          <div id="m-terminal-section">
            <label class="perm-check" style="width: 100%">
              <input type="checkbox" id="perm-execute" />
              <span class="perm-check-label">
                <i
                  class="fas fa-terminal"
                  style="margin-right: 6px; width: 12px"
                ></i>
                Allow terminal access
                <span
                  style="
                    font-weight: 400;
                    color: var(--text-muted);
                    margin-left: 4px;
                  "
                  >(role sets file permissions)</span
                >
              </span>
            </label>
          </div>

          <div id="m-paths-section">
            <label class="form-label" style="display: block; margin-bottom: 8px"
              >Directory Access</label
            >
            <div
              style="
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-bottom: 10px;
              "
            >
              <label class="perm-check">
                <input
                  type="radio"
                  name="path-mode"
                  value="all"
                  id="path-mode-all"
                  checked
                />
                <span class="perm-check-label">
                  <i
                    class="fas fa-globe"
                    style="margin-right: 6px; width: 12px"
                  ></i>
                  Allow everything
                </span>
              </label>
              <label class="perm-check">
                <input
                  type="radio"
                  name="path-mode"
                  value="allowlist"
                  id="path-mode-allow"
                />
                <span class="perm-check-label">
                  <i
                    class="fas fa-list-check"
                    style="margin-right: 6px; width: 12px"
                  ></i>
                  Only allow specific paths
                </span>
              </label>
              <label class="perm-check">
                <input
                  type="radio"
                  name="path-mode"
                  value="denylist"
                  id="path-mode-deny"
                />
                <span class="perm-check-label">
                  <i
                    class="fas fa-ban"
                    style="margin-right: 6px; width: 12px"
                  ></i>
                  Block specific paths (allow rest)
                </span>
              </label>
            </div>
            <div id="m-paths-list-wrapper" style="display: none">
              <div class="paths-list" id="m-paths-list"></div>
              <button type="button" class="add-path-btn" id="add-path-btn">
                <i class="fas fa-plus"></i> Add path
              </button>
            </div>
          </div>

          <div class="auth-error" id="modal-error" style="margin-top: 4px">
            <i class="fas fa-exclamation-circle"></i>
            <span id="modal-error-text"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn-primary" id="modal-save">Save</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="delete-modal">
      <div class="modal-box" style="max-width: 380px">
        <div class="modal-head">
          <div class="modal-head-title" style="color: var(--error)">
            <i
              class="fas fa-exclamation-triangle"
              style="margin-right: 6px"
            ></i>
            Delete User
          </div>
          <button class="modal-close-btn" id="delete-modal-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="confirm-delete" id="delete-confirm-text"></div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="delete-cancel">Cancel</button>
          <button class="btn-danger" id="delete-confirm">Delete</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="passwd-modal">
      <div class="modal-box" style="max-width: 400px">
        <div class="modal-head">
          <div class="modal-head-title">Change Password</div>
          <button class="modal-close-btn" id="passwd-modal-close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input
              type="password"
              class="form-input"
              id="new-pass"
              placeholder="Min 8 characters"
              autocomplete="new-password"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input
              type="password"
              class="form-input"
              id="new-pass-confirm"
              placeholder="Repeat password"
              autocomplete="new-password"
            />
          </div>
          <div class="auth-error" id="passwd-error">
            <i class="fas fa-exclamation-circle"></i>
            <span id="passwd-error-text"></span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="passwd-cancel">Cancel</button>
          <button class="btn-primary" id="passwd-save">Update Password</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        try {
          const saved = localStorage.getItem("fileExplorerSettings");
          if (saved) {
            const settings = JSON.parse(saved);
            if (settings.accentColor) {
              const hex = settings.accentColor;
              const r = parseInt(hex.slice(1, 3), 16);
              const g = parseInt(hex.slice(3, 5), 16);
              const b = parseInt(hex.slice(5, 7), 16);
              if (!isNaN(r))
                document.documentElement.style.setProperty(
                  "--accent-color",
                  `${r}, ${g}, ${b}`,
                );
            }
          }
        } catch (_) {}
      })();

      let users = [];
      let currentUser = null;
      let editingUserId = null;
      let deletingUserId = null;
      let changingPassUserId = null;

      function notify(msg, type = "success") {
        const notif = document.getElementById("notif");
        const item = document.createElement("div");
        item.className = `notif-item ${type}`;
        item.innerHTML = `<i class="fas fa-${type === "success" ? "check-circle" : "exclamation-circle"}"></i> ${msg}`;
        notif.appendChild(item);
        setTimeout(() => item.remove(), 3000);
      }

      async function init() {
        try {
          const res = await fetch("/api/auth/me");
          if (!res.ok) {
            window.location.replace("/login");
            return;
          }
          currentUser = await res.json();
          if (currentUser.role !== "admin") {
            window.location.replace("/");
            return;
          }
          document.getElementById("current-user-display").textContent =
            `Signed in as ${currentUser.username}`;
          await loadUsers();
        } catch {
          window.location.replace("/login");
        }
      }

      async function loadUsers() {
        const res = await fetch("/api/auth/users");
        if (!res.ok) return;
        users = await res.json();
        renderUsers();
      }

      function formatDate(iso) {
        if (!iso) return "—";
        const d = new Date(iso);
        return (
          d.toLocaleDateString() +
          " " +
          d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        );
      }

      function renderUsers() {
        const container = document.getElementById("users-container");
        if (!users.length) {
          container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i>No users found.</div>`;
          return;
        }

        const rows = users
          .map((u) => {
            const isMe = u.id === currentUser.id;
            const roleBadge = `<span class="role-badge ${u.role}">${
              u.role === "readwrite"
                ? "Read/Write"
                : u.role === "readonly"
                  ? "Read-only"
                  : "Admin"
            }</span>`;
            const perms =
              (u.permissions || [])
                .filter((p) => p !== "admin")
                .map((p) => `<span class="perm-tag">${p}</span>`)
                .join("") || '<span class="text-muted">—</span>';
            const pathMode =
              u.pathMode ||
              (u.allowedPaths?.includes("*") ? "all" : "allowlist");
            const pathList =
              pathMode === "denylist"
                ? u.deniedPaths || []
                : u.allowedPaths || [];
            const paths =
              pathMode === "all" || u.role === "admin"
                ? `<span class="perm-tag" style="color:var(--accent)">All paths</span>`
                : pathMode === "denylist"
                  ? pathList.length
                    ? `<span class="perm-tag" style="color:var(--warning)">Block: </span>` +
                      pathList
                        .map(
                          (p) =>
                            `<span class="perm-tag" title="${p}">${p.length > 24 ? "…" + p.slice(-22) : p}</span>`,
                        )
                        .join("")
                    : `<span class="perm-tag" style="color:var(--warning)">All except nothing</span>`
                  : pathList
                      .map(
                        (p) =>
                          `<span class="perm-tag" title="${p}">${p.length > 24 ? "…" + p.slice(-22) : p}</span>`,
                      )
                      .join("") || '<span class="text-muted">No paths</span>';

            const actions = `
          <div class="table-actions">
            <button class="admin-action-btn" onclick="openChangePass('${u.id}')" title="Change password">
              <i class="fas fa-key"></i>
            </button>
            <button class="admin-action-btn" onclick="openEdit('${u.id}')" title="Edit user">
              <i class="fas fa-pencil-alt"></i>
            </button>
            ${
              !isMe
                ? `<button class="admin-action-btn danger" onclick="openDelete('${u.id}')" title="Delete user">
              <i class="fas fa-trash"></i>
            </button>`
                : `<button class="admin-action-btn" style="opacity:0.3; cursor:not-allowed" title="Cannot delete yourself" disabled>
              <i class="fas fa-trash"></i>
            </button>`
            }
          </div>`;

            return `<tr>
          <td>
            <span class="user-avatar">${u.username[0].toUpperCase()}</span>
            ${u.username}${isMe ? ' <span class="text-muted">(you)</span>' : ""}
          </td>
          <td>${roleBadge}</td>
          <td>${perms}</td>
          <td style="max-width:200px; overflow:hidden">${paths}</td>
          <td class="text-muted">${formatDate(u.lastLogin)}</td>
          <td>${actions}</td>
        </tr>`;
          })
          .join("");

        container.innerHTML = `
        <table class="users-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Permissions</th>
              <th>Allowed Paths</th>
              <th>Last Login</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      function addPathEntry(value = "") {
        const list = document.getElementById("m-paths-list");
        const entry = document.createElement("div");
        entry.className = "path-entry";
        entry.innerHTML = `
        <input type="text" class="form-input path-input" placeholder="/home/user" value="${value}" spellcheck="false" />
        <button type="button" class="path-remove-btn" onclick="this.closest('.path-entry').remove()">
          <i class="fas fa-minus"></i>
        </button>`;
        list.appendChild(entry);
        entry.querySelector("input").focus();
      }

      function getPaths() {
        return [...document.querySelectorAll(".path-input")]
          .map((i) => i.value.trim())
          .filter(Boolean);
      }

      function getPathMode() {
        return (
          document.querySelector('input[name="path-mode"]:checked')?.value ||
          "all"
        );
      }

      document.querySelectorAll('input[name="path-mode"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          const show = radio.value !== "all" && radio.checked;
          document.getElementById("m-paths-list-wrapper").style.display = show
            ? "block"
            : "none";
        });
      });

      document.getElementById("m-role").addEventListener("change", syncRoleUI);

      function syncRoleUI() {
        const isAdmin = document.getElementById("m-role").value === "admin";
        const termSection = document.getElementById("m-terminal-section");
        const pathSection = document.getElementById("m-paths-section");
        termSection.style.opacity = isAdmin ? "0.4" : "1";
        termSection.style.pointerEvents = isAdmin ? "none" : "all";
        pathSection.style.opacity = isAdmin ? "0.4" : "1";
        pathSection.style.pointerEvents = isAdmin ? "none" : "all";
      }

      document.getElementById("add-user-btn").addEventListener("click", () => {
        editingUserId = null;
        document.getElementById("modal-title").textContent = "Add User";
        document.getElementById("m-username").value = "";
        document.getElementById("m-username").disabled = false;
        document.getElementById("m-password").value = "";
        document.getElementById("m-password").placeholder =
          "Enter password (min 8 chars)";
        document.getElementById("m-password-hint").textContent = "";
        document.getElementById("m-role").value = "readwrite";
        document.getElementById("perm-execute").checked = false;
        document.getElementById("path-mode-all").checked = true;
        document.getElementById("m-paths-list").innerHTML = "";
        document.getElementById("m-paths-list-wrapper").style.display = "none";
        document.getElementById("modal-error").classList.remove("visible");
        syncRoleUI();
        openModal("user-modal");
        setTimeout(() => document.getElementById("m-username").focus(), 100);
      });

      function openEdit(id) {
        const u = users.find((u) => u.id === id);
        if (!u) return;
        editingUserId = id;
        document.getElementById("modal-title").textContent =
          `Edit — ${u.username}`;
        document.getElementById("m-username").value = u.username;
        document.getElementById("m-username").disabled = true;
        document.getElementById("m-password").value = "";
        document.getElementById("m-password").placeholder =
          "Leave blank to keep current";
        document.getElementById("m-password-hint").textContent = "(optional)";
        document.getElementById("m-role").value = u.role;
        document.getElementById("perm-execute").checked =
          u.permissions?.includes("execute") || false;

        const pathMode = u.pathMode || "all";
        document.querySelector(
          `input[name="path-mode"][value="${pathMode}"]`,
        ).checked = true;
        document.getElementById("m-paths-list").innerHTML = "";
        const pathsToShow =
          pathMode === "denylist" ? u.deniedPaths || [] : u.allowedPaths || [];
        const showPathList = pathMode !== "all";
        document.getElementById("m-paths-list-wrapper").style.display =
          showPathList ? "block" : "none";
        pathsToShow.forEach((p) => addPathEntry(p));
        document.getElementById("modal-error").classList.remove("visible");
        syncRoleUI();
        openModal("user-modal");
      }

      function openDelete(id) {
        const u = users.find((u) => u.id === id);
        if (!u) return;
        deletingUserId = id;
        document.getElementById("delete-confirm-text").innerHTML =
          `Are you sure you want to delete <strong>${u.username}</strong>?<br><br>
        This action cannot be undone. The user will immediately lose all access.`;
        openModal("delete-modal");
      }

      function openChangePass(id) {
        changingPassUserId = id;
        document.getElementById("new-pass").value = "";
        document.getElementById("new-pass-confirm").value = "";
        document.getElementById("passwd-error").classList.remove("visible");
        openModal("passwd-modal");
        setTimeout(() => document.getElementById("new-pass").focus(), 100);
      }

      function openModal(id) {
        document.getElementById(id).classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }

      ["modal-close", "modal-cancel"].forEach((id) =>
        document
          .getElementById(id)
          .addEventListener("click", () => closeModal("user-modal")),
      );
      ["delete-modal-close", "delete-cancel"].forEach((id) =>
        document
          .getElementById(id)
          .addEventListener("click", () => closeModal("delete-modal")),
      );
      ["passwd-modal-close", "passwd-cancel"].forEach((id) =>
        document
          .getElementById(id)
          .addEventListener("click", () => closeModal("passwd-modal")),
      );

      ["user-modal", "delete-modal", "passwd-modal"].forEach((id) => {
        document.getElementById(id).addEventListener("click", (e) => {
          if (e.target === e.currentTarget) closeModal(id);
        });
      });

      document
        .getElementById("add-path-btn")
        .addEventListener("click", () => addPathEntry());

      document.getElementById("m-toggle-pass").addEventListener("click", () => {
        const inp = document.getElementById("m-password");
        inp.type = inp.type === "password" ? "text" : "password";
        document.getElementById("m-toggle-pass").querySelector("i").className =
          inp.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
      });

      document
        .getElementById("modal-save")
        .addEventListener("click", async () => {
          const errorBox = document.getElementById("modal-error");
          const errorText = document.getElementById("modal-error-text");
          const showErr = (msg) => {
            errorText.textContent = msg;
            errorBox.classList.add("visible");
          };
          errorBox.classList.remove("visible");

          const username = document.getElementById("m-username").value.trim();
          const password = document.getElementById("m-password").value;
          const role = document.getElementById("m-role").value;
          const terminalAccess =
            document.getElementById("perm-execute").checked;
          const pathMode = getPathMode();
          const paths = getPaths();

          if (!editingUserId && (!username || username.length < 2)) {
            return showErr("Username must be at least 2 characters.");
          }
          if (!editingUserId && (!password || password.length < 8)) {
            return showErr("Password must be at least 8 characters.");
          }
          if (editingUserId && password && password.length < 8) {
            return showErr("New password must be at least 8 characters.");
          }

          const saveBtn = document.getElementById("modal-save");
          saveBtn.disabled = true;
          saveBtn.textContent = "Saving…";

          try {
            let res;
            if (editingUserId) {
              const body = {
                role,
                terminalAccess,
                pathMode,
                allowedPaths: pathMode === "allowlist" ? paths : [],
                deniedPaths: pathMode === "denylist" ? paths : [],
              };
              if (password) body.password = password;
              res = await fetch(`/api/auth/users/${editingUserId}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
              });
            } else {
              res = await fetch("/api/auth/users", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  username,
                  password,
                  role,
                  terminalAccess,
                  pathMode,
                  allowedPaths: pathMode === "allowlist" ? paths : [],
                  deniedPaths: pathMode === "denylist" ? paths : [],
                }),
              });
            }

            const data = await res.json();
            if (res.ok) {
              closeModal("user-modal");
              notify(editingUserId ? "User updated." : "User created.");
              await loadUsers();
            } else {
              showErr(data.error || "Failed to save user.");
            }
          } catch {
            showErr("Connection error.");
          } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = "Save";
          }
        });

      document
        .getElementById("delete-confirm")
        .addEventListener("click", async () => {
          if (!deletingUserId) return;
          const btn = document.getElementById("delete-confirm");
          btn.disabled = true;
          btn.textContent = "Deleting…";
          try {
            const res = await fetch(`/api/auth/users/${deletingUserId}`, {
              method: "DELETE",
            });
            const data = await res.json();
            if (res.ok) {
              closeModal("delete-modal");
              notify("User deleted.", "success");
              await loadUsers();
            } else {
              notify(data.error || "Delete failed.", "error");
            }
          } catch {
            notify("Connection error.", "error");
          } finally {
            btn.disabled = false;
            btn.textContent = "Delete";
            deletingUserId = null;
          }
        });

      document
        .getElementById("passwd-save")
        .addEventListener("click", async () => {
          const newPass = document.getElementById("new-pass").value;
          const newPassConfirm =
            document.getElementById("new-pass-confirm").value;
          const errBox = document.getElementById("passwd-error");
          const errText = document.getElementById("passwd-error-text");
          const showErr = (msg) => {
            errText.textContent = msg;
            errBox.classList.add("visible");
          };
          errBox.classList.remove("visible");

          if (!newPass || newPass.length < 8)
            return showErr("Password must be at least 8 characters.");
          if (newPass !== newPassConfirm)
            return showErr("Passwords do not match.");

          const btn = document.getElementById("passwd-save");
          btn.disabled = true;
          btn.textContent = "Updating…";

          try {
            const res = await fetch(`/api/auth/users/${changingPassUserId}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: newPass }),
            });
            const data = await res.json();
            if (res.ok) {
              closeModal("passwd-modal");
              notify("Password updated.");
            } else {
              showErr(data.error || "Failed to update password.");
            }
          } catch {
            showErr("Connection error.");
          } finally {
            btn.disabled = false;
            btn.textContent = "Update Password";
          }
        });

      init();
    </script>
